x-python-base: &python-base
  restart: unless-stopped
  env_file: ../../.env
  environment:
    PYTHONUNBUFFERED: "1"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-policy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-policy}
      POSTGRES_DB: ${POSTGRES_DB:-policy_intel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-policy} -d ${POSTGRES_DB:-policy_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    <<: *python-base
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"

  collector:
    <<: *python-base
    build:
      context: ../..
      dockerfile: apps/collector/Dockerfile
    environment:
      RUN_ON_START: "false"

  worker:
    <<: *python-base
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    volumes:
      - ../../data:/app/data:ro

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
