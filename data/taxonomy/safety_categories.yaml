# AI Safety Taxonomy Categories
#
# Used for semantic similarity mapping of policy documents to safety domains.
#
# Framework references:
#   - NIST AI Risk Management Framework (AI RMF 1.0), January 2023
#     https://www.nist.gov/artificial-intelligence/executive-order-safe-secure-and-trustworthy-artificial-intelligence
#   - EU AI Act (Regulation 2024/1689), August 2024
#     https://eur-lex.europa.eu/eli/reg/2024/1689/oj
#
# Each category maps to one or more NIST Trustworthy AI Characteristics
# (Valid & Reliable, Safe, Secure & Resilient, Accountable & Transparent,
# Explainable & Interpretable, Privacy Enhanced, Fair with Harmful Bias Managed)
# and relevant EU AI Act articles where applicable.

categories:
  - slug: safety_guidelines
    name: Safety Guidelines & Red Lines
    description: >
      Explicit safety constraints, prohibited behaviors, hard limits, red lines,
      refusal policies, and content restrictions imposed on the AI system.
    nist_mapping: Safe
    eu_ai_act: "Article 9 (Risk Management), Annex IV §2(b)"

  - slug: alignment_values
    name: Alignment & Core Values
    description: >
      Stated values, ethical principles, honesty commitments, helpfulness goals,
      and alignment philosophy guiding model behavior.
    nist_mapping: Valid and Reliable, Accountable and Transparent
    eu_ai_act: "Article 9 (Risk Management)"

  - slug: bias_fairness
    name: Bias & Fairness
    description: >
      Policies on demographic bias, equal treatment across groups, protected
      characteristics, discriminatory output prevention, and fairness testing.
    nist_mapping: Fair – with Harmful Bias Managed
    eu_ai_act: "Article 10 (Data Governance), Recital 47"

  - slug: privacy_data
    name: Privacy & Data Handling
    description: >
      User data privacy, personal information handling, data retention, training
      data consent, and user confidentiality policies.
    nist_mapping: Privacy Enhanced
    eu_ai_act: "Article 10 (Data Governance), Article 53(1)(d)"

  - slug: transparency
    name: Transparency & Explainability
    description: >
      Disclosure of AI identity, model limitations, uncertainty communication,
      capability claims, and explainability commitments.
    nist_mapping: Accountable and Transparent, Explainable and Interpretable
    eu_ai_act: "Article 13 (Transparency), Article 50, Annex IV §2(g)"

  - slug: harmful_content
    name: Harmful Content Prevention
    description: >
      Policies preventing generation of CSAM, graphic violence, self-harm
      instructions, hate speech, harassment, and dangerous content.
    nist_mapping: Safe
    eu_ai_act: "Article 5 (Prohibited Practices), Article 9"

  - slug: dual_use
    name: Dual-Use & Weapons
    description: >
      Controls on CBRN weapons information, cyberweapons, bioweapons uplift,
      and dual-use knowledge that could enable mass harm.
    nist_mapping: Safe, Secure and Resilient
    eu_ai_act: "Recital 33 (national security exclusion context)"

  - slug: political_neutrality
    name: Political Neutrality & Elections
    description: >
      Commitments to political neutrality, election integrity, avoiding undue
      influence on voting behavior, and balanced political discourse.
    nist_mapping: Fair – with Harmful Bias Managed
    eu_ai_act: "Article 5(1)(a) (manipulation prohibition)"

  - slug: human_oversight
    name: Human Oversight & Control
    description: >
      Mechanisms for human oversight, model auditing, shutdown capability,
      interpretability research, and control over autonomous systems.
    nist_mapping: Accountable and Transparent
    eu_ai_act: "Article 14 (Human Oversight), Annex IV §2(e)"

  - slug: agentic_behavior
    name: Agentic Behavior & Autonomy
    description: >
      Policies on autonomous AI actions, tool use, multi-step task execution,
      irreversible actions, and AI agency limits.
    nist_mapping: Safe, Accountable and Transparent
    eu_ai_act: "Article 14 (Human Oversight)"

  - slug: creative_fiction
    name: Creative Content & Fiction
    description: >
      Guidelines for creative writing, fictional scenarios, roleplay, adult
      content, and distinguishing fiction from factual claims.
    nist_mapping: ~
    eu_ai_act: "Article 50 (Transparency for generated content)"

  - slug: legal_compliance
    name: Legal Compliance & Copyright
    description: >
      Copyright, intellectual property, defamation, legal jurisdiction
      compliance, and regulatory adherence policies.
    nist_mapping: ~
    eu_ai_act: "Article 53(1)(c) (copyright policy for GPAI)"

  - slug: misinformation
    name: Misinformation & Factual Accuracy
    description: >
      Commitments to factual accuracy, handling contested claims, spreading
      misinformation prevention, and epistemic responsibility.
    nist_mapping: Valid and Reliable
    eu_ai_act: "Article 9 (Risk Management), Recital 47"

  - slug: child_safety
    name: Child Safety
    description: >
      Protecting minors from exploitation, age-appropriate content filtering,
      CSAM prevention, and child-directed product policies.
    nist_mapping: Safe
    eu_ai_act: "Article 5 (Prohibited Practices — subliminal techniques on minors)"

  - slug: mental_health
    name: Mental Health & Vulnerable Users
    description: >
      Safe messaging on suicide/self-harm, support for vulnerable users,
      crisis resources, and mental health sensitivity guidelines.
    nist_mapping: Safe, Fair – with Harmful Bias Managed
    eu_ai_act: "Article 5(1)(a) (exploitation of vulnerabilities)"
