  # ── Multilingual ──────────────────────────────────────────────────────────
  - slug: mgsm
    name: MGSM
    category: multilingual
    description: Multilingual Grade School Math
    metric_name: accuracy
    metric_unit: "%"
    higher_is_better: true

  # ── Instruction following ─────────────────────────────────────────────────
  - slug: ifeval
    name: IFEval
    category: instruction_following
    description: Instruction Following Evaluation
    metric_name: accuracy
    metric_unit: "%"
    higher_is_better: true
    source_url: https://arxiv.org/abs/2311.07911
    policy_note:
      measures: |
        541 prompts paired with verifiable constraints (e.g., "respond in
        exactly 3 paragraphs", "include the word X", "use only lowercase").
        Scoring is rule-based: did the output satisfy each constraint?
      caveat: |
        Tests format compliance, not response quality. A model that answers
        wrong but follows instructions perfectly scores well. Two reporting
        variants exist (prompt-level vs. instruction-level strict accuracy)
        and the variant is not always disclosed.
      intended_for: |
        Measuring whether a model can follow detailed formatting instructions.
      how_to_read: |
        Higher is better. Prefer the "strict" variant when comparing across
        labs; "loose" gives partial credit and inflates scores.
      topic_tags: [instruction_following, formatting, constraint_compliance]
      sources:
        paper: https://arxiv.org/abs/2311.07911

  # ── Vision ────────────────────────────────────────────────────────────────
  - slug: mmmu
    name: MMMU
    category: vision
    description: Massive Multi-discipline Multimodal Understanding
    metric_name: accuracy
    metric_unit: "%"
    higher_is_better: true

